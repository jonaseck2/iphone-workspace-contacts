name: WorkspaceContacts

options:
  bundleIdPrefix: com.imeto.workspacecontacts
  deploymentTarget:
    iOS: "16.0"

packages:
  WorkspaceContactsCore:
    path: ../Core
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.0.0"

targets:
  WorkspaceContacts:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Imeto Google Cloud iOS OAuth client (non-secret; consent screen = Internal).
        GIDClientID: 950349872392-8arhv8529ipt6vue4326c82atbte83f0.apps.googleusercontent.com
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.950349872392-8arhv8529ipt6vue4326c82atbte83f0
        NSContactsUsageDescription: WorkspaceContacts adds your Imeto colleagues to your Contacts so their names show on incoming calls and you can call them by name.
        BGTaskSchedulerPermittedIdentifiers:
          - com.imeto.workspacecontacts.app.refresh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imeto.workspacecontacts.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Distribution signing. DEVELOPMENT_TEAM is read from the environment at
        # `xcodegen generate` time, so the org Team ID lands only in the generated
        # (gitignored) .xcodeproj and never in this committed spec. For a device/archive
        # build: `export DEVELOPMENT_TEAM=XXXXXXXXXX` before generating. Empty is fine for
        # Simulator builds (no signing needed).
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    dependencies:
      - package: WorkspaceContactsCore
        product: WorkspaceContactsCore
      - package: GoogleSignIn
        product: GoogleSignIn

  WorkspaceContactsTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests
    dependencies:
      - target: WorkspaceContacts
